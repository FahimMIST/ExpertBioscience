<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth rounded base for high visibility on both dark and light browser tabs -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <!-- Outer circle border accent in expert blue -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#2b3b90" stroke-width="16" />
  
  <!-- Sleek corporate fish art -->
  <!-- Main Body (Vibrant Red) -->
  <path d="M 110,256 C 160,140 320,130 390,220 L 430,175 L 430,337 L 390,292 C 320,382 160,372 110,256 Z" fill="#e11922" />
  
  <!-- Bioscience Leaf/Fin Accent (Teal Green) representing organic, natural solutions -->
  <path d="M 230,285 C 210,310 190,345 195,365 C 215,370 250,350 270,325 C 290,300 275,275 230,285 Z" fill="#009660" />
  
  <!-- Head/Gill separator curve (Deep Blue) -->
  <path d="M 190,205 C 215,225 215,287 190,307" fill="none" stroke="#2b3b90" stroke-width="18" stroke-linecap="round" />
  
  <!-- Eye (Clean circular cutout, filled with background blue/white) -->
  <circle cx="165" cy="235" r="14" fill="#2b3b90" />
</svg>
